# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Server Configuration
server.port=8080

# Springdoc OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationThatIsLongEnoughForSecurity
jwt.expiration=86400000

# Logging Configuration
logging.level.info.quazi.valueProtect.security=DEBUG
logging.level.root=INFO

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.file.upload.directory=uploads/appraisal-documents
app.file.base.url=http://localhost:8080

# Stripe configuration
stripe.api.key=
stripe.webhook.secret=

# Payment flow defaults
app.payment.default-fee-cents=49900
app.payment.currency=usd

# Outbound email configuration
app.email.from=no-reply@valueprotect.com
# spring.mail.host=smtp.gmail.com
