# spring.mail.properties.mail.smtp.starttls.enable=true

# PDF Processing API Configuration
pdf.processing.api.url=http://localhost:8000/process-pdf
pdf.processing.api.enabled=true
pdf.processing.api.timeout=60000
# IMPORTANT: The JWT secret MUST match the secret configured in your PDF processing API
# Make sure this matches JWT_SECRET in your PDF processing service
pdf.processing.jwt.secret=your-super-secret-key-change-this-in-production-min-32-chars
pdf.processing.jwt.algorithm=HS256
pdf.processing.jwt.expiration=3600000

logging.level.info.quazi.valueProtect.util.JwtUtil=DEBUG
logging.level.info.quazi.valueProtect.service.PdfProcessingService=DEBUG
